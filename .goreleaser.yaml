# GoReleaser config for radioactive-ralph
# https://goreleaser.com/customization/

version: 2

project_name: radioactive_ralph

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: radioactive_ralph
    main: ./cmd/radioactive_ralph
    binary: radioactive_ralph
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.Date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: default
    ids: [radioactive_ralph]
    name_template: >-
      radioactive_ralph_{{ .Version }}_
      {{- if eq .Os "darwin" }}darwin_{{ .Arch }}
      {{- else if eq .Os "linux" }}linux_{{ .Arch }}
      {{- else if eq .Os "windows" }}windows_{{ .Arch }}
      {{- end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - cmd: cosign
    signature: "${artifact}.cosign.sig"
    certificate: "${artifact}.cosign.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

# Single cross-packager repo at jbcom/pkgs holds Formula/, bucket/,
# choco/, nix/, etc. Brew convention requires a `homebrew-*` repo for
# the `brew tap jbcom/tap` shorthand — we publish there as a mirror.
brews:
  - name: radioactive-ralph
    ids: [default]
    repository:
      owner: jbcom
      name: pkgs
      branch: main
      token: "{{ .Env.JBCOM_PKGS_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/jbcom/radioactive-ralph
    description: Autonomous continuous development orchestrator for Claude Code
    license: MIT
    commit_author:
      name: jbcom-bot
      email: noreply@jonbogaty.com
    test: |
      system "#{bin}/radioactive_ralph", "--version"
    install: |
      bin.install "radioactive_ralph"
    # Service block is intentionally omitted for now.
    # `radioactive_ralph service install --variant <name>` handles per-variant
    # service registration at runtime, since only three of the ten
    # variants are service-appropriate and they take different flags.

  # Brew-tap-convention mirror so `brew tap jbcom/tap` shorthand works.
  - name: radioactive-ralph
    ids: [default]
    repository:
      owner: jbcom
      name: homebrew-tap
      branch: main
      token: "{{ .Env.JBCOM_HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/jbcom/radioactive-ralph
    description: Autonomous continuous development orchestrator for Claude Code
    license: MIT
    commit_author:
      name: jbcom-bot
      email: noreply@jonbogaty.com
    test: |
      system "#{bin}/radioactive_ralph", "--version"
    install: |
      bin.install "radioactive_ralph"

scoops:
  - name: radioactive-ralph
    ids: [default]
    repository:
      owner: jbcom
      name: pkgs
      branch: main
      token: "{{ .Env.JBCOM_PKGS_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/jbcom/radioactive-ralph
    description: Autonomous continuous development orchestrator for Claude Code
    license: MIT

chocolateys:
  - name: radioactive-ralph
    ids: [default]
    owners: jbcom
    title: Radioactive Ralph
    authors: Jon B <jon@jonbogaty.com>
    project_url: https://github.com/jbcom/radioactive-ralph
    license_url: https://github.com/jbcom/radioactive-ralph/blob/main/LICENSE
    project_source_url: https://github.com/jbcom/radioactive-ralph
    package_source_url: https://github.com/jbcom/pkgs
    docs_url: https://github.com/jbcom/radioactive-ralph#readme
    bug_tracker_url: https://github.com/jbcom/radioactive-ralph/issues
    summary: Autonomous continuous development orchestrator for Claude Code
    description: |
      Radioactive Ralph is a per-repo meta-orchestrator that keeps a
      fleet of Claude subprocesses alive, focused, and productive
      across days of autonomous development work.
    tags: "claude ai orchestrator automation cli"
    release_notes: "https://github.com/jbcom/radioactive-ralph/releases/tag/v{{ .Version }}"
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
    source_repo: "https://push.chocolatey.org/"
    skip_publish: false

release:
  github:
    owner: jbcom
    name: radioactive-ralph
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ## Install

    Homebrew (macOS / Linux / WSL2+Linuxbrew):
    ```
    brew tap jbcom/tap
    brew install radioactive-ralph
    ```

    Scoop (Windows):
    ```
    scoop bucket add jbcom https://github.com/jbcom/pkgs
    scoop install radioactive-ralph
    ```

    Chocolatey (Windows):
    ```
    choco install radioactive-ralph
    ```

    curl | sh:
    ```
    curl -sSL https://jonbogaty.com/radioactive-ralph/install.sh | sh
    ```
