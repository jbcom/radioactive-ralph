# GoReleaser config for radioactive-ralph
# https://goreleaser.com/customization/

version: 2

project_name: radioactive_ralph

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: radioactive_ralph
    main: ./cmd/radioactive_ralph
    binary: radioactive_ralph
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.Date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: default
    ids: [radioactive_ralph]
    name_template: >-
      radioactive_ralph_{{ .Version }}_
      {{- if eq .Os "darwin" }}darwin_{{ .Arch }}
      {{- else if eq .Os "linux" }}linux_{{ .Arch }}
      {{- else if eq .Os "windows" }}windows_{{ .Arch }}
      {{- end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - cmd: cosign
    signature: "${artifact}.cosign.sig"
    certificate: "${artifact}.cosign.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

# Single cross-packager repo at jbcom/pkgs holds Formula/, bucket/,
# choco/, nix/, etc. Users tap with `brew tap jbcom/pkgs` — no separate
# homebrew-* mirror needed.
brews:
  - name: radioactive-ralph
    ids: [default]
    repository:
      owner: jbcom
      name: pkgs
      branch: main
      token: "{{ .Env.JBCOM_PKGS_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/jbcom/radioactive-ralph
    description: Autonomous continuous development orchestrator for Claude Code
    license: MIT
    commit_author:
      name: jbcom-bot
      email: noreply@jonbogaty.com
    test: |
      system "#{bin}/radioactive_ralph", "--version"
    install: |
      bin.install "radioactive_ralph"
    caveats: |
      To register this ralph as an MCP server for Claude Code (so a
      fresh `claude` session automatically sees plan.* and variant.*
      tools), run:

        radioactive_ralph mcp register

      Default scope is `user` and transport is `stdio`. Pass
      `--transport http` if you plan to run ralph as a durable
      brew-service + HTTP server. See:

        https://jonbogaty.com/radioactive-ralph/guides/transports/
    # Service block is intentionally omitted for now.
    # `radioactive_ralph service install --variant <name>` handles per-variant
    # service registration at runtime, since only three of the ten
    # variants are service-appropriate and they take different flags.

scoops:
  - name: radioactive-ralph
    ids: [default]
    repository:
      owner: jbcom
      name: pkgs
      branch: main
      token: "{{ .Env.JBCOM_PKGS_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/jbcom/radioactive-ralph
    description: Autonomous continuous development orchestrator for Claude Code
    license: MIT
    post_install:
      - "Write-Host 'To register this ralph as an MCP server for Claude Code, run:'"
      - "Write-Host '  radioactive_ralph mcp register'"
      - "Write-Host 'See https://jonbogaty.com/radioactive-ralph/guides/transports/ for transport options.'"

# Chocolatey publishing is split into .goreleaser.chocolatey.yaml and
# runs from a windows-latest job in release.yml, since `choco.exe`
# is only available on Windows runners.

release:
  github:
    owner: jbcom
    name: radioactive-ralph
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ## Install

    Homebrew (macOS / Linux / WSL2+Linuxbrew):
    ```
    brew tap jbcom/tap
    brew install radioactive-ralph
    ```

    Scoop (Windows):
    ```
    scoop bucket add jbcom https://github.com/jbcom/pkgs
    scoop install radioactive-ralph
    ```

    Chocolatey (Windows):
    ```
    choco install radioactive-ralph
    ```

    curl | sh:
    ```
    curl -sSL https://jonbogaty.com/radioactive-ralph/install.sh | sh
    ```
