# GoReleaser config for radioactive-ralph
# https://goreleaser.com/customization/

version: 2

project_name: radioactive_ralph

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: radioactive_ralph
    main: ./cmd/radioactive_ralph
    binary: radioactive_ralph
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.Date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: default
    ids: [radioactive_ralph]
    name_template: >-
      radioactive_ralph_{{ .Version }}_
      {{- if eq .Os "darwin" }}darwin_{{ .Arch }}
      {{- else if eq .Os "linux" }}linux_{{ .Arch }}
      {{- else if eq .Os "windows" }}windows_{{ .Arch }}
      {{- end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

# Native Linux packages (.deb / .rpm) for the CLI. CGO-off like the archives,
# so they build in the same ubuntu goreleaser run and are cosign-signed via the
# checksums entry below. The GUI app is packaged separately per-OS (fyne
# package) — see the packaging design spec.
nfpms:
  - id: radioactive_ralph
    ids: [radioactive_ralph]
    package_name: radioactive-ralph
    vendor: Jon Bogaty
    homepage: https://github.com/jbcom/radioactive-ralph
    maintainer: jbcom-bot <noreply@jonbogaty.com>
    description: Supervised-execution runtime for local AI-agent CLIs
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    # Only the CLI binary is packaged; the per-user supervisor registers itself
    # with the OS service manager via `radioactive_ralph service install`, so
    # there is no system-wide unit file to ship here.
    contents:
      - src: LICENSE
        dst: /usr/share/doc/radioactive-ralph/LICENSE
      - src: README.md
        dst: /usr/share/doc/radioactive-ralph/README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - cmd: cosign
    signature: "${artifact}.cosign.sig"
    certificate: "${artifact}.cosign.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

# Single cross-packager repo at jbcom/pkgs holds Formula/, bucket/,
# choco/, nix/, etc. Users tap with
# `brew tap jbcom/pkgs https://github.com/jbcom/pkgs` (the explicit URL
# form is required because the repo isn't named homebrew-pkgs).
brews:
  - name: radioactive-ralph
    ids: [default]
    repository:
      owner: jbcom
      name: pkgs
      branch: "chore/update-radioactive-ralph-{{ .Version }}"
      token: "{{ .Env.JBCOM_PKGS_GITHUB_TOKEN }}"
      # jbcom/pkgs main is governed by the enterprise Main ruleset
      # which requires pull_request for all pushes. GoReleaser opens a
      # PR from the version-named branch; jbcom/pkgs' automerge
      # workflow takes it from there.
      pull_request:
        enabled: true
        base:
          owner: jbcom
          name: pkgs
          branch: main
    directory: Formula
    homepage: https://github.com/jbcom/radioactive-ralph
    description: Supervised-execution runtime for local AI-agent CLIs
    license: MIT
    commit_author:
      name: jbcom-bot
      email: noreply@jonbogaty.com
    test: |
      system "#{bin}/radioactive_ralph", "--version"
    install: |
      bin.install "radioactive_ralph"
    caveats: |
      Next step — start the supervisor, then register a project:

        radioactive_ralph service install
        radioactive_ralph --init

      Run `radioactive_ralph` inside a registered project for the
      read-only TUI once the supervisor is running. Full docs:

        https://jonbogaty.com/radioactive-ralph/getting-started/
    # Homebrew service blocks are intentionally omitted. `service install`
    # registers the per-user supervisor with the native OS service manager
    # itself; there is no per-repo service to declare here.

scoops:
  - name: radioactive-ralph
    ids: [default]
    repository:
      owner: jbcom
      name: pkgs
      branch: "chore/update-radioactive-ralph-{{ .Version }}"
      token: "{{ .Env.JBCOM_PKGS_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: jbcom
          name: pkgs
          branch: main
    directory: bucket
    homepage: https://github.com/jbcom/radioactive-ralph
    description: Supervised-execution runtime for local AI-agent CLIs
    license: MIT
    post_install:
      - "Write-Host 'Next step — start the supervisor, then register a project:'"
      - "Write-Host '  radioactive_ralph service install'"
      - "Write-Host '  radioactive_ralph --init'"
      - "Write-Host 'See https://jonbogaty.com/radioactive-ralph/getting-started/ for the full setup flow.'"

# Chocolatey publishing is split into .goreleaser.chocolatey.yaml and
# runs from a windows-latest job in release.yml, since `choco.exe`
# is only available on Windows runners.

release:
  github:
    owner: jbcom
    name: radioactive-ralph
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ## Install

    Homebrew (macOS / Linux / Linuxbrew):
    ```
    brew tap jbcom/pkgs https://github.com/jbcom/pkgs
    brew install radioactive-ralph
    ```

    Scoop (Windows):
    ```
    scoop bucket add jbcom https://github.com/jbcom/pkgs
    scoop install radioactive-ralph
    ```

    Chocolatey (Windows):
    ```
    choco install radioactive-ralph
    ```

    curl | sh:
    ```
    curl -sSL https://jonbogaty.com/radioactive-ralph/install.sh | sh
    ```

    First run:
    ```
    radioactive_ralph service install
    radioactive_ralph --init
    radioactive_ralph
    ```
