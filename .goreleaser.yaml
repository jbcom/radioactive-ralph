# GoReleaser config for radioactive-ralph
# https://goreleaser.com/customization/

version: 2

project_name: radioactive_ralph

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: radioactive_ralph
    main: ./cmd/radioactive_ralph
    binary: radioactive_ralph
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.Date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: default
    ids: [radioactive_ralph]
    name_template: >-
      radioactive_ralph_{{ .Version }}_
      {{- if eq .Os "darwin" }}darwin_{{ .Arch }}
      {{- else if eq .Os "linux" }}linux_{{ .Arch }}
      {{- else if eq .Os "windows" }}windows_{{ .Arch }}
      {{- end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - cmd: cosign
    signature: "${artifact}.cosign.sig"
    certificate: "${artifact}.cosign.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

# Single cross-packager repo at jbcom/pkgs holds Formula/, bucket/,
# choco/, nix/, etc. Users tap with `brew tap jbcom/pkgs` — no separate
# homebrew-* mirror needed.
brews:
  - name: radioactive-ralph
    ids: [default]
    repository:
      owner: jbcom
      name: pkgs
      branch: main
      token: "{{ .Env.JBCOM_PKGS_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/jbcom/radioactive-ralph
    description: Binary-first repo runtime with many Ralph personalities
    license: MIT
    commit_author:
      name: jbcom-bot
      email: noreply@jonbogaty.com
    test: |
      system "#{bin}/radioactive_ralph", "--version"
    install: |
      bin.install "radioactive_ralph"
    caveats: |
      Next step — initialize a repo and let Fixit seed the first plan:

        radioactive_ralph init
        radioactive_ralph run --variant fixit --advise --topic bootstrap
        radioactive_ralph service start

      Use `radioactive_ralph tui` for the cockpit once the repo service
      is running. Full docs:

        https://jonbogaty.com/radioactive-ralph/getting-started/
    # Homebrew service blocks are intentionally omitted. Ralph's durable
    # runtime is repo-scoped and `radioactive_ralph service install`
    # needs the operator's chosen repo root at runtime.

scoops:
  - name: radioactive-ralph
    ids: [default]
    repository:
      owner: jbcom
      name: pkgs
      branch: main
      token: "{{ .Env.JBCOM_PKGS_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/jbcom/radioactive-ralph
    description: Binary-first repo runtime with many Ralph personalities
    license: MIT
    post_install:
      - "Write-Host 'Next step — initialize a repo and let Fixit seed the first plan:'"
      - "Write-Host '  radioactive_ralph init'"
      - "Write-Host '  radioactive_ralph run --variant fixit --advise --topic bootstrap'"
      - "Write-Host '  radioactive_ralph service start'"
      - "Write-Host 'See https://jonbogaty.com/radioactive-ralph/getting-started/ for the full setup flow.'"

# Chocolatey publishing is split into .goreleaser.chocolatey.yaml and
# runs from a windows-latest job in release.yml, since `choco.exe`
# is only available on Windows runners.

release:
  github:
    owner: jbcom
    name: radioactive-ralph
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ## Install

    Homebrew (macOS / Linux / Linuxbrew):
    ```
    brew tap jbcom/pkgs
    brew install radioactive-ralph
    ```

    Scoop (Windows):
    ```
    scoop bucket add jbcom https://github.com/jbcom/pkgs
    scoop install radioactive-ralph
    ```

    Chocolatey (Windows):
    ```
    choco install radioactive-ralph
    ```

    curl | sh:
    ```
    curl -sSL https://jonbogaty.com/radioactive-ralph/install.sh | sh
    ```

    First repo bootstrap:
    ```
    radioactive_ralph init
    radioactive_ralph run --variant fixit --advise --topic bootstrap
    radioactive_ralph service start
    radioactive_ralph tui
    ```
