name: Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
        For **security vulnerabilities**, use [GitHub Security Advisories](https://github.com/jbcom/radioactive-ralph/security/advisories/new) instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `ralph run` with config ...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log lines (redact tokens).
      render: text

  - type: input
    id: version
    attributes:
      label: radioactive-ralph version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.12.3
    validations:
      required: true

  - type: dropdown
    id: forge
    attributes:
      label: Forge type
      options:
        - GitHub
        - GitLab
        - Gitea
        - Forgejo
        - Not applicable
    validations:
      required: true
