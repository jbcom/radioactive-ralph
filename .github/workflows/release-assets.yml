name: Release Assets

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  update-assets:
    name: Update demo GIF on release PR
    # Only run on PRs created by release-please
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          # Use PAT to ensure the auto-commit triggers CI workflows
          token: ${{ secrets.CI_GITHUB_TOKEN }}
      
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
          # Install VHS via Go as it's the most reliable way on Linux runner
          go install github.com/charmbracelet/vhs@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      
      - name: Install Ralph
        run: uv pip install --system .
        
      - name: Generate demo gif
        run: vhs scripts/demo.tape

      - name: Validate generated asset
        run: |
          if [ ! -f assets/demo.gif ]; then
            echo "Error: assets/demo.gif was not generated!"
            exit 1
          fi
          if [ ! -s assets/demo.gif ]; then
            echo "Error: assets/demo.gif is empty!"
            exit 1
          fi
          
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: update generated demo gif for release"
          file_pattern: 'assets/*.gif'
          branch: ${{ github.head_ref }}
