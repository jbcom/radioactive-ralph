name: Provider Live

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-providers:
    name: live provider smoke
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      CLAUDE_AUTHENTICATED: ${{ secrets.ANTHROPIC_API_KEY != '' && '1' || '0' }}
      CODEX_AUTHENTICATED: '0'
      GEMINI_AUTHENTICATED: ${{ (secrets.GEMINI_API_KEY != '' || secrets.GOOGLE_API_KEY != '') && '1' || '0' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Verify live provider secrets
        env:
          HAS_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY != '' && '1' || '0' }}
          HAS_OPENAI: ${{ secrets.OPENAI_API_KEY != '' && '1' || '0' }}
          HAS_GEMINI: ${{ (secrets.GEMINI_API_KEY != '' || secrets.GOOGLE_API_KEY != '') && '1' || '0' }}
        run: |
          missing=0
          if [[ "$HAS_ANTHROPIC" != "1" ]]; then
            echo "::error::ANTHROPIC_API_KEY is required for the stable provider gate"
            missing=1
          fi
          if [[ "$HAS_OPENAI" != "1" ]]; then
            echo "::error::OPENAI_API_KEY is required for the stable provider gate"
            missing=1
          fi
          if [[ "$HAS_GEMINI" != "1" ]]; then
            echo "::error::GEMINI_API_KEY or GOOGLE_API_KEY is required for the stable provider gate"
            missing=1
          fi
          exit "$missing"
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest
      - name: Install Codex CLI
        run: npm install -g @openai/codex@latest
      - name: Authenticate Codex CLI
        if: env.OPENAI_API_KEY != ''
        run: |
          printenv OPENAI_API_KEY | codex login --with-api-key
          codex login status
          echo "CODEX_AUTHENTICATED=1" >> "$GITHUB_ENV"
      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli@latest
      - name: Smoke live providers
        run: go test ./tests/integration -run 'TestLiveClaudeRoundTrip|TestLiveClaudeModelSanity|TestLiveClaudeRunnerTurn|TestLiveCodexRunnerTurn|TestLiveGeminiRunnerTurn' -v
