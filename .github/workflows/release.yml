name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    name: GoReleaser (linux + macOS + windows archives, brew, scoop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.1

      # Pre-flight: fail fast with a readable error if CI_GITHUB_TOKEN
      # isn't set. This PAT needs contents:write on this repo plus
      # jbcom/pkgs (brew formula + scoop bucket land there).
      - name: Verify release secret is set
        env:
          CI_TOKEN_SET: ${{ secrets.CI_GITHUB_TOKEN != '' }}
        run: |
          if [[ "$CI_TOKEN_SET" != "true" ]]; then
            echo "::error::CI_GITHUB_TOKEN secret is not configured"
            exit 1
          fi
          echo "Release secret verified."

      - uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          JBCOM_PKGS_GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}

  chocolatey:
    name: GoReleaser (chocolatey publish)
    needs: goreleaser
    runs-on: windows-latest
    # GitHub does not allow `secrets.*` in jobs.<job_id>.if, so we gate
    # the optional publish path with a tiny first step before checkout.
    if: vars.ENABLE_CHOCOLATEY == 'true'
    steps:
      - name: Check chocolatey publish prerequisites
        id: prereq
        shell: bash
        env:
          CHOCO_TOKEN_SET: ${{ secrets.CHOCOLATEY_API_KEY != '' }}
        run: |
          if [[ "$CHOCO_TOKEN_SET" != "true" ]]; then
            echo "Chocolatey publish skipped: CHOCOLATEY_API_KEY is not configured."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "Chocolatey publish prerequisites satisfied."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.prereq.outputs.should_publish == 'true'
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        if: steps.prereq.outputs.should_publish == 'true'
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.4.0
        if: steps.prereq.outputs.should_publish == 'true'
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config .goreleaser.chocolatey.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
