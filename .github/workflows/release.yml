name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: pypa/hatch@v1
      - run: hatch build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/radioactive-ralph/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-docs:
    name: Publish Sphinx docs to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: pypa/hatch@v1
      - name: Build Sphinx docs
        run: hatch run docs:build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _build/html
      - id: deployment
        uses: actions/deploy-pages@v5
