name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Build distribution
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  publish-docs:
    name: Publish Sphinx docs to GitHub Pages
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install documentation dependencies
        run: uv sync --group dev --group docs
      - name: Populate docs content
        run: |
          mkdir -p docs/content/skills
          cp README.md docs/content/README.md
          cp skills/README.md docs/content/skills/README.md
          for d in blue-ralph green-ralph grey-ralph immortal-ralph joe-fixit-ralph old-man-ralph professor-ralph red-ralph savage-ralph world-breaker-ralph; do
            mkdir -p docs/content/skills/$d
            cp skills/$d/README.md docs/content/skills/$d/README.md
          done
      - name: Build Sphinx docs
        run: uv run sphinx-build docs/ _build/html -b html
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: _build/html
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
