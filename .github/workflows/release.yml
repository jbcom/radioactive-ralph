name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.1

      # Pre-flight: fail fast with a readable error if CI_GITHUB_TOKEN
      # isn't set. This PAT needs contents:write on the release repo
      # plus the Homebrew tap and Scoop bucket repos.
      - name: Verify release secret is set
        env:
          CI_TOKEN_SET: ${{ secrets.CI_GITHUB_TOKEN != '' }}
        run: |
          if [[ "$CI_TOKEN_SET" != "true" ]]; then
            echo "::error::CI_GITHUB_TOKEN secret is not configured"
            exit 1
          fi
          echo "Release secret verified."

      - uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
