name: CD

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-assets:
    name: Generate and commit assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.CI_GITHUB_TOKEN }}
      
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      
      - name: Install Ralph for VHS
        run: uv pip install --system .
        
      - name: Generate demo gif
        uses: charmbracelet/vhs-action@59641cdc7fadf3978db65eb8c6937ea2752f4ec3 # v2.1.0
        with:
          path: scripts/demo.tape
          
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: update generated assets [skip ci]"
          file_pattern: 'assets/*.gif'

  build:
    name: Build distribution
    needs: generate-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Build package
        run: uv build
      - name: Store artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist/

  release-please:
    name: Release Please
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          release-type: python
          token: ${{ secrets.CI_GITHUB_TOKEN }}
