name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run tests
        run: uv run pytest tests/ --cov=radioactive_ralph --cov-report=xml:coverage-${{ matrix.python-version }}.xml --junitxml=pytest-results-${{ matrix.python-version }}.xml
      
      - name: Upload test artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-artifacts-${{ matrix.python-version }}
          path: |
            coverage-${{ matrix.python-version }}.xml
            pytest-results-${{ matrix.python-version }}.xml
          retention-days: 1

      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run ruff
        run: uv run ruff check src/

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run mypy
        run: uv run mypy src/

  sonarqube-and-report:
    name: SonarQube & Test Report
    needs: [test, lint, type-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
      statuses: write
    if: always()
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      
      - name: Download all test artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        id: download
        continue-on-error: true
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish Test Results
        if: steps.download.outcome == 'success'
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: "artifacts/pytest-results-*.xml"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  update-release-assets:
    name: Update demo GIF on release PR
    needs: [test, lint, type-check]
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.CI_GITHUB_TOKEN }}
      
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      
      - name: Install Tox
        run: pipx install tox tox-uv
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
          go install github.com/charmbracelet/vhs@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      
      - name: Install Ralph
        run: uv tool install .
        
      - name: Generate demo gif
        run: vhs scripts/demo.tape

      - name: Validate generated asset
        run: |
          if [ ! -s assets/demo.gif ]; then
            echo "Error: assets/demo.gif is missing or empty!"
            exit 1
          fi
          
      - name: Upload demo GIF artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: demo-gif
          path: assets/demo.gif
          retention-days: 14
          
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: update generated demo gif for release"
          file_pattern: 'assets/*.gif'
          branch: ${{ github.head_ref }}

      - name: Comment on PR with Demo Link
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          message: |
            ### 🎬 Demo GIF Updated
            
            The terminal recording has been automatically re-generated and committed to this branch.
            
            ![VHS GIF](https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref }}/assets/demo.gif)
          comment_tag: "vhs-demo-gif"
          mode: "upsert"
