name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest
      - name: go mod download
        run: go mod download
      - name: go test (Unix)
        if: runner.os != 'Windows'
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: go test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: go test ./...
      - name: Build CLI (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp
          bin="$(pwd)/.tmp/radioactive_ralph"
          go build -o "$bin" ./cmd/radioactive_ralph
          echo "RALPH_BIN=$bin" >> "$GITHUB_ENV"
      - name: Native CLI smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          "$RALPH_BIN" --help >/dev/null
          "$RALPH_BIN" service --help >/dev/null
          "$RALPH_BIN" service install --help >/dev/null
          "$RALPH_BIN" service status --help >/dev/null
          "$RALPH_BIN" service uninstall --help >/dev/null
          "$RALPH_BIN" doctor
      - name: Temp project + supervisor + service-definition smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          project="$tmpdir/project"
          home="$tmpdir/home"
          state="$tmpdir/state"
          log="$tmpdir/supervisor.log"
          mkdir -p "$project" "$home" "$state"
          export HOME="$home"
          export RALPH_STATE_DIR="$state"

          # A plain client run against an uninitialized, supervisor-less
          # directory auto-routes to init (spec §4) and then fails
          # cleanly with no supervisor listening yet.
          if (cd "$project" && "$RALPH_BIN") >/dev/null 2>&1; then
            echo "expected the plain client to fail before any supervisor is running" >&2
            exit 1
          fi

          # --init explicitly.
          (cd "$project" && "$RALPH_BIN" --init >/dev/null)

          # Start the durable supervisor in the background.
          "$RALPH_BIN" --supervisor >"$log" 2>&1 &
          sup_pid=$!
          cleanup() {
            if kill -0 "$sup_pid" >/dev/null 2>&1; then
              kill "$sup_pid" >/dev/null 2>&1 || true
              wait "$sup_pid" || true
            fi
          }
          trap cleanup EXIT

          ready=0
          for _ in $(seq 1 30); do
            if (cd "$project" && "$RALPH_BIN") 2>/dev/null | grep -q "supervisor is up"; then
              ready=1
              break
            fi
            sleep 1
          done
          if [[ "$ready" -ne 1 ]]; then
            cat "$log" >&2 || true
            echo "supervisor never became ready" >&2
            exit 1
          fi

          kill "$sup_pid"
          wait "$sup_pid" || true
          trap - EXIT

          stopped=0
          for _ in $(seq 1 30); do
            if ! (cd "$project" && "$RALPH_BIN") 2>/dev/null | grep -q "supervisor is up"; then
              stopped=1
              break
            fi
            sleep 1
          done
          if [[ "$stopped" -ne 1 ]]; then
            cat "$log" >&2 || true
            echo "supervisor never stopped" >&2
            exit 1
          fi

          # Service-definition install/status/uninstall round trip (does
          # NOT start the service — that platform-specific path is
          # exercised by .github/workflows/service-managers.yml).
          "$RALPH_BIN" service install --bin "$RALPH_BIN" >/dev/null
          "$RALPH_BIN" service status | grep -qi "installed"
          "$RALPH_BIN" service uninstall >/dev/null
      - name: Build CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .tmp | Out-Null
          $bin = Join-Path (Get-Location) ".tmp\\radioactive_ralph.exe"
          go build -o $bin ./cmd/radioactive_ralph
          "RALPH_BIN=$bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Native CLI smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function Invoke-NativeChecked {
            param(
              [Parameter(Mandatory = $true)][string]$FilePath,
              [Parameter(Mandatory = $true)][string[]]$ArgumentList,
              [switch]$SuppressOutput
            )
            if ($SuppressOutput) {
              & $FilePath @ArgumentList | Out-Null
            } else {
              & $FilePath @ArgumentList
            }
            if ($LASTEXITCODE -ne 0) {
              throw "$FilePath $($ArgumentList -join ' ') failed with exit code $LASTEXITCODE"
            }
          }
          Invoke-NativeChecked -FilePath $env:RALPH_BIN -ArgumentList @("--help") -SuppressOutput
          Invoke-NativeChecked -FilePath $env:RALPH_BIN -ArgumentList @("service", "--help") -SuppressOutput
          Invoke-NativeChecked -FilePath $env:RALPH_BIN -ArgumentList @("service", "install", "--help") -SuppressOutput
          Invoke-NativeChecked -FilePath $env:RALPH_BIN -ArgumentList @("service", "status", "--help") -SuppressOutput
          Invoke-NativeChecked -FilePath $env:RALPH_BIN -ArgumentList @("service", "uninstall", "--help") -SuppressOutput
          Invoke-NativeChecked -FilePath $env:RALPH_BIN -ArgumentList @("doctor")
      - name: Temp project + supervisor smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function Invoke-QuietNative {
            param(
              [Parameter(Mandatory = $true)][string]$FilePath,
              # NOT Mandatory and defaulted to @(): the bare-client smoke case
              # invokes radioactive_ralph with NO args, and a Mandatory
              # [string[]] parameter rejects an empty array outright.
              [string[]]$ArgumentList = @()
            )
            $token = [guid]::NewGuid().ToString()
            $stdout = Join-Path $env:RUNNER_TEMP "$token.stdout.log"
            $stderr = Join-Path $env:RUNNER_TEMP "$token.stderr.log"
            try {
              # Start-Process -ArgumentList also rejects an empty array, so
              # only pass it when there are actually args to forward.
              $startArgs = @{
                FilePath               = $FilePath
                RedirectStandardOutput = $stdout
                RedirectStandardError  = $stderr
                PassThru               = $true
                Wait                   = $true
                NoNewWindow            = $true
              }
              if ($ArgumentList.Count -gt 0) { $startArgs.ArgumentList = $ArgumentList }
              $proc = Start-Process @startArgs
              return $proc.ExitCode
            } finally {
              Remove-Item $stdout, $stderr -ErrorAction SilentlyContinue
            }
          }
          $tmp = Join-Path $env:RUNNER_TEMP "ralph-smoke"
          $project = Join-Path $tmp "project"
          # NB: $HOME is a read-only PowerShell automatic variable — assigning
          # to it throws WriteError, so use $homeDir for the isolated home.
          $homeDir = Join-Path $tmp "home"
          $state = Join-Path $tmp "state"
          New-Item -ItemType Directory -Force -Path $project, $homeDir, $state | Out-Null
          $env:HOME = $homeDir
          $env:RALPH_STATE_DIR = $state

          Push-Location $project
          try {
            & $env:RALPH_BIN --init | Out-Null
            $clientExit = Invoke-QuietNative -FilePath $env:RALPH_BIN -ArgumentList @()
            if ($clientExit -eq 0) { throw "expected the plain client to fail before any supervisor is running" }
          } finally {
            Pop-Location
          }

          $supStdout = Join-Path $tmp "supervisor.stdout.log"
          $supStderr = Join-Path $tmp "supervisor.stderr.log"
          $proc = Start-Process -FilePath $env:RALPH_BIN -ArgumentList @("--supervisor") -RedirectStandardOutput $supStdout -RedirectStandardError $supStderr -PassThru

          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            Push-Location $project
            try {
              $out = & $env:RALPH_BIN 2>$null
              if (($out -join "`n") -match "supervisor is up") {
                $ready = $true
                break
              }
            } catch {
            } finally {
              Pop-Location
            }
            Start-Sleep -Seconds 1
          }
          if (-not $ready) {
            if (Test-Path $supStdout) { Get-Content $supStdout }
            if (Test-Path $supStderr) { Get-Content $supStderr }
            throw "supervisor never became ready"
          }

          Stop-Process -Id $proc.Id -Force
          $deadline = (Get-Date).AddSeconds(30)
          while (-not $proc.HasExited -and (Get-Date) -lt $deadline) {
            Start-Sleep -Milliseconds 200
          }
          if (-not $proc.HasExited) {
            throw "supervisor did not exit within 30s"
          }

          Push-Location $project
          try {
            $clientExit = Invoke-QuietNative -FilePath $env:RALPH_BIN -ArgumentList @()
            if ($clientExit -eq 0) { throw "expected the plain client to fail after the supervisor stopped" }
          } finally {
            Pop-Location
          }

          & $env:RALPH_BIN service install --bin $env:RALPH_BIN | Out-Null
          $statusOut = & $env:RALPH_BIN service status
          if (($statusOut -join "`n") -notmatch "(?i)installed") { throw "service status did not report installed" }
          & $env:RALPH_BIN service uninstall | Out-Null
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out

  e2e:
    name: E2E (CI-feasible)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: go mod download
        run: go mod download
      - name: Materialize the reference test-repo fixture
        run: |
          set -euo pipefail
          mkdir -p "$HOME/src/reference-codebases"
          git clone --depth 1 https://github.com/zpqrtbnk/test-repo "$HOME/src/reference-codebases/test-repo"
      - name: E2E (real binary, pty-driven, fake provider CLI — no RALPH_E2E_LIVE)
        run: go test ./tests/e2e/... -v -timeout 5m

  gui:
    name: GUI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      # Fyne is a CGO GUI dependency. On Linux it needs the GL + X11 dev headers
      # to link even against the headless test driver; macOS links Cocoa via the
      # toolchain. The rest of CI builds CGO-off and excludes the `gui`-tagged
      # package entirely — this job is the only place it is compiled.
      - name: Install Linux GL/X11/Wayland dev headers
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # Fyne's documented Linux build deps: GL + X11 (xorg-dev) AND the
          # Wayland stack — glfw 3.4 compiles its Wayland backend unconditionally,
          # so wayland-client-core.h (libwayland-dev) + wayland-protocols +
          # libxkbcommon are all required even for a headless test-driver build.
          sudo apt-get install -y \
            libgl1-mesa-dev xorg-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols
      - name: go mod download
        run: go mod download
      - name: Build GUI-enabled binary
        env:
          CGO_ENABLED: '1'
        run: go build -tags gui ./...
      - name: Test GUI package (headless test driver)
        env:
          CGO_ENABLED: '1'
        run: go test -tags gui ./internal/gui/... -timeout 5m

  build-targets:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: go mod download
        run: go mod download
      - name: Cross-build module
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...
      - name: Cross-build platform-sensitive test binaries
        shell: bash
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/testbins
          for pkg in ./cmd/radioactive_ralph ./internal/ipc ./internal/service ./internal/supervisor ./internal/provider/claudesession; do
            name="$(echo "$pkg" | tr '/.' '__')"
            out=".tmp/testbins/${name}"
            if [[ "$GOOS" == "windows" ]]; then
              out="${out}.exe"
            fi
            go test -c -o "$out" "$pkg"
            rm -f "$out"
          done

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest

  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest
      - name: Lint workflows
        run: actionlint

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install gomarkdoc
        run: go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
      - name: Install tox
        run: python -m pip install --upgrade pip tox
      - name: Build docs
        run: tox -e docs

  packaging:
    name: Packaging lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      # Validate the goreleaser config (CLI archives, nfpms, brews, scoops,
      # winget) so a config error surfaces on the PR, not at release-tag time.
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
      - name: Install shellcheck + desktop-file-utils
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck desktop-file-utils
      - name: Shellcheck packaging + install scripts
        run: shellcheck packaging/linux/build-appimage.sh packaging/macos/publish-cask.sh site/public/install.sh
      - name: Validate the .desktop launcher
        run: desktop-file-validate packaging/linux/radioactive-ralph.desktop
