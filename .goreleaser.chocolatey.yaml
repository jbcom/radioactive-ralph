# GoReleaser config for the chocolatey-only windows-runner job.
#
# The primary .goreleaser.yaml runs on ubuntu and handles every other
# artifact (brew, scoop, nix, archives, checksums, signatures, GitHub
# release). Chocolatey publishing requires `choco.exe` which is only
# available on windows-latest runners, so we split it into this config
# and run it from a second job.
#
# This config rebuilds the windows-amd64 binary (cheap for a pure-Go
# project) and generates + publishes the .nupkg. It does NOT create a
# GitHub release (disabled below) — the ubuntu job already did that.

version: 2

project_name: radioactive_ralph

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: radioactive_ralph
    main: ./cmd/radioactive_ralph
    binary: radioactive_ralph
    env:
      - CGO_ENABLED=0
    goos: [windows]
    goarch: [amd64]
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.Date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: default
    ids: [radioactive_ralph]
    name_template: >-
      radioactive_ralph_{{ .Version }}_windows_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  disable: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

# Chocolatey publishing — the whole reason this config exists.
chocolateys:
  - name: radioactive-ralph
    ids: [default]
    owners: jbcom
    title: Radioactive Ralph
    authors: Jon B <jon@jonbogaty.com>
    project_url: https://github.com/jbcom/radioactive-ralph
    license_url: https://github.com/jbcom/radioactive-ralph/blob/main/LICENSE
    project_source_url: https://github.com/jbcom/radioactive-ralph
    package_source_url: https://github.com/jbcom/pkgs
    docs_url: https://github.com/jbcom/radioactive-ralph#readme
    bug_tracker_url: https://github.com/jbcom/radioactive-ralph/issues
    summary: Binary-first repo runtime with many Ralph personalities
    description: |
      Radioactive Ralph is a binary-first repo runtime for AI-assisted
      development. It keeps a durable SQLite plan DAG, runs a
      repo-scoped service, and lets operators choose from ten built-in
      Ralph personas.
    tags: "ai runtime automation cli development"
    release_notes: "https://github.com/jbcom/radioactive-ralph/releases/tag/v{{ .Version }}"
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
    source_repo: "https://push.chocolatey.org/"
    skip_publish: false

# The ubuntu job already created the GitHub release — disable here so
# we don't attempt to create a duplicate.
release:
  disable: true
