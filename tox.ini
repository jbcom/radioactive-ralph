[tox]
requires = tox>=4.21
env_list = docs
skipsdist = true

[testenv:docs]
description = Build Sphinx docs after generating the Go API markdown.
allowlist_externals = bash
deps =
    sphinx>=8.0.0
    shibuya>=2024.11.10
    myst-parser>=3.0.0
    linkify-it-py>=2.0.0
commands =
    bash scripts/generate-api-docs.sh
    bash scripts/validate-docs.sh
    sphinx-build -b html docs docs/_build/html
