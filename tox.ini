[tox]
requires =
    tox>=4.15.0
    tox-uv>=1.8.0
envlist = py312, py313, lint, type-check, docs
isolated_build = True

[testenv]
description = run tests with pytest
package = editable
deps =
    pytest>=9.0.3
    pytest-asyncio>=1.3.0
    pytest-cov>=7.1.0
    pytest-mock>=3.15.1
    pytest-xdist>=3.6.0
    respx>=0.22.0
    anyio>=4.13.0
commands =
    pytest {posargs:tests/ --cov=radioactive_ralph --cov-report=xml --cov-report=term-missing}

[testenv:lint]
description = run ruff linting
deps =
    ruff>=0.9.0
commands =
    ruff check src/

[testenv:type-check]
description = run mypy type checking
deps =
    mypy>=1.20.0
    # Include dependencies needed for type checking
    pydantic>=2.7.0
    click>=8.1.0
    httpx>=0.27.0
    anthropic>=0.25.0
    gitpython>=3.1.0
    rich>=13.7.0
commands =
    mypy src/

[testenv:docs]
description = build documentation
deps =
    sphinx>=8.0.0
    shibuya>=2024.11.10
    sphinx-autoapi>=3.4.0
    myst-parser>=3.0.0
commands =
    python scripts/validate_docs.py
    sphinx-build docs/ _build/html -b html
